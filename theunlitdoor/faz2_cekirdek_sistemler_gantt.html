<div style="padding: 1rem 0; overflow-x: auto; background: #0D1117; border-radius: 12px; padding: 1.5rem;">
<div style="min-width: 880px;">

<div style="margin-bottom: 1.5rem;">
  <div style="font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #2EA87A; font-weight: 500; margin-bottom: 4px;">Faz 2</div>
  <div style="font-size: 18px; font-weight: 500; color: #E6EDF3; margin-bottom: 2px;">Çekirdek sistemler ve bölüm prototipleri</div>
  <div style="font-size: 13px; color: #8B949E;">Hafta 3–6 &middot; Milestone: M2 — Mekanik çekirdek tamam (Hafta 6 sonu)</div>
</div>

<div id="chart2"></div>

<div style="display: flex; gap: 16px; margin-top: 1.25rem; font-size: 12px; color: #8B949E;">
  <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #2EA87A;"></span>Aktif çalışma</span>
  <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: rgba(46, 168, 122, 0.35);"></span>Destek / polish</span>
  <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 8px; height: 8px; border-radius: 50%; background: #2EA87A;"></span>Teslimat</span>
</div>

</div>
</div>

<script>
const tasks = [
  { wbs: "2.1", label: "Hub graybox ve kapı sistemi", owner: "TECH + ART", start: 2, span: 2, support: 0, output: "Hafıza merkezi" },
  { wbs: "2.2", label: "Bölüm 1: The Chase graybox", owner: "TECH", start: 2, span: 2, support: 0, output: "Chase prototipi" },
  { wbs: "2.3", label: "Bölüm 1 ses ve baskı katmanları", owner: "AUDIO", start: 3, span: 2, support: 0, output: "Chase feedback seti" },
  { wbs: "2.4", label: "Bölüm 2: The Match prototipi", owner: "TECH + GD", start: 3, span: 2, support: 0, output: "Zamanlama ve baskı" },
  { wbs: "2.5", label: "Bölüm 2 UI bozulma mantığı", owner: "ART + TECH", start: 4, span: 2, support: 0, output: "Dinamik başarı UI" },
  { wbs: "2.6", label: "Bölüm 3: The Stage prototipi", owner: "TECH + GD", start: 4, span: 2, support: 0, output: "Nefes/ritim oynanışı" },
  { wbs: "2.7", label: "Bölüm 3 ses ve ritim baskısı", owner: "AUDIO", start: 4, span: 2, support: 0, output: "Stage ses sistemi" },
  { wbs: "2.8", label: "Bölüm 4: Final proof-of-concept", owner: "TECH + GD", start: 5, span: 2, support: 0, output: "Büyüyen tehdit" },
  { wbs: "2.9", label: "Checkpoint, retry ve state yönetimi", owner: "TECH", start: 3, span: 3, support: 0, output: "Bölümler arası sistem" },
];

const totalWeeks = 10;
const container = document.getElementById('chart2');
const cols = '36px 1fr 90px 150px minmax(0, 500px)';

const headerRow = document.createElement('div');
headerRow.style.cssText = `display: grid; grid-template-columns: ${cols}; gap: 0; align-items: end; margin-bottom: 6px; padding-bottom: 6px; border-bottom: 0.5px solid #30363D;`;
['WBS', 'Görev', 'Sorumlu', 'Beklenen Çıktı', ''].forEach((h, i) => {
  const d = document.createElement('div');
  d.style.cssText = 'font-size: 11px; color: #484F58; text-transform: uppercase; letter-spacing: 0.5px;' + (i === 0 ? 'padding-left: 2px;' : '') + (i === 2 ? 'text-align: center;' : '') + (i === 3 ? 'padding-left: 6px;' : '');
  if (i === 4) {
    d.style.display = 'grid';
    d.style.gridTemplateColumns = 'repeat(10, 1fr)';
    for (let w = 1; w <= 10; w++) {
      const ws = document.createElement('div');
      ws.style.cssText = 'text-align: center; font-size: 11px; color: #484F58;';
      ws.textContent = w;
      d.appendChild(ws);
    }
  } else {
    d.textContent = h;
  }
  headerRow.appendChild(d);
});
container.appendChild(headerRow);

tasks.forEach(t => {
  const row = document.createElement('div');
  row.style.cssText = `display: grid; grid-template-columns: ${cols}; gap: 0; align-items: center; padding: 5px 0;`;

  const wbs = document.createElement('div');
  wbs.style.cssText = 'font-size: 12px; color: #8B949E; font-weight: 500; padding-left: 2px;';
  wbs.textContent = t.wbs;

  const lbl = document.createElement('div');
  lbl.style.cssText = 'font-size: 13px; color: #E6EDF3; line-height: 1.3; padding-right: 8px;';
  lbl.textContent = t.label;

  const own = document.createElement('div');
  own.style.cssText = 'font-size: 11px; color: #8B949E; text-align: center;';
  own.textContent = t.owner;

  const out = document.createElement('div');
  out.style.cssText = 'font-size: 11px; color: #56D4A0; padding-left: 6px; line-height: 1.3;';
  out.textContent = t.output;

  const grid = document.createElement('div');
  grid.style.cssText = 'position: relative; height: 30px; display: grid; grid-template-columns: repeat(10, 1fr);';

  for (let i = 0; i < 10; i++) {
    const cell = document.createElement('div');
    const inRange = i >= 2 && i <= 6;
    cell.style.cssText = 'border-left: 0.5px solid #30363D; height: 100%;' + (!inRange ? 'opacity: 0.3;' : '');
    if (i === 9) cell.style.borderRight = '0.5px solid #30363D';
    grid.appendChild(cell);
  }

  const bar = document.createElement('div');
  const l = (t.start / totalWeeks * 100);
  const w = (t.span / totalWeeks * 100);
  bar.style.cssText = `position: absolute; left: ${l}%; width: ${w}%; top: 4px; height: 22px; background: rgba(46, 168, 122, 0.15); border: 1px solid #2EA87A; border-radius: 4px; z-index: 1;`;

  const endWeek = t.start + t.span;
  const dot = document.createElement('div');
  dot.style.cssText = `position: absolute; left: calc(${(endWeek / totalWeeks * 100)}% - 4px); top: 11px; width: 8px; height: 8px; border-radius: 50%; background: #2EA87A; z-index: 2;`;

  grid.appendChild(bar);
  grid.appendChild(dot);

  row.appendChild(wbs);
  row.appendChild(lbl);
  row.appendChild(own);
  row.appendChild(out);
  row.appendChild(grid);
  container.appendChild(row);
});
</script>
